<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="X-AMZ LLC — an independent software business. Home of byte.glass, requiem, and http-files.org.">
  <meta name="theme-color" content="#171412">
  <meta property="og:title" content="X-AMZ LLC">
  <meta property="og:description" content="An independent software business. Home of byte.glass, requiem, and http-files.org.">
  <meta property="og:image" content="https://x-amz.dev/combined.png">
  <meta property="og:url" content="https://x-amz.dev">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page">

    <header class="masthead">
      <img class="mark" src="/combined.png" alt="X-AMZ">
      <h1 class="wordmark">X-AMZ LLC</h1>
      <p class="tagline">independent software</p>

    <hr>

    <section class="sites" aria-label="Product domains">
      <a class="site site--byte-glass" href="https://byte.glass">
        <img class="site-icon" src="/icons/blob.png" alt="">
        <span class="site-name">byte.glass</span>
        <span class="site-arrow" aria-hidden="true">&rarr;</span>
        <span class="site-desc">Tools for seeing bytes clearly.</span>
      </a>
      <a class="site site--requiem-rest" href="https://requiem.rest">
        <img class="site-icon" src="/icons/requiem.png" alt="">
        <span class="site-name">requiem.rest</span>
        <span class="site-arrow" aria-hidden="true">&rarr;</span>
        <span class="site-desc">.http for Apple Shortcuts.</span>
      </a>
      <a class="site site--http-files" href="https://http-files.org">
        <img class="site-icon" src="/icons/http-file.svg" alt="">
        <span class="site-name">http-files.org</span>
        <span class="site-arrow" aria-hidden="true">&rarr;</span>
        <span class="site-desc">Community spec for the .http file format.</span>
      </a>
    </section>

    <hr>

    <footer>
      <span>Seattle</span>
      <span class="sep" aria-hidden="true">·</span>
      <a href="mailto:support@x-amz.dev">support@x-amz.dev</a>
